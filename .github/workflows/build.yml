name: Build and Push Images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io/getbrik

jobs:
  lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: images/base/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: images/node/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: images/python/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: images/java/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: images/rust/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: images/dotnet/Dockerfile

  generate-matrix:
    name: Generate Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: matrix
        run: |
          matrix=$(jq -c '{
            include: [
              .stacks | to_entries[] |
              .key as $stack |
              .value.versions[] as $version |
              {
                stack: $stack,
                version: $version,
                verify_cmd: .value.verify_cmd
              }
            ]
          }' versions.json)
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.stack }}:${{ matrix.version }}
    needs: [lint, generate-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read versions
        id: versions
        run: |
          echo "yq_version=$(jq -r '.tools.yq' versions.json)" >> "$GITHUB_OUTPUT"
          echo "jq_version=$(jq -r '.tools.jq' versions.json)" >> "$GITHUB_OUTPUT"

          # Check if this version is first in the array (gets "latest" tag)
          first=$(jq -r ".stacks.\"${{ matrix.stack }}\".versions[0]" versions.json)
          if [ "$first" = "${{ matrix.version }}" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${REGISTRY}/brik-runner-${{ matrix.stack }}"
          VERSION="${{ matrix.version }}"
          SHA="sha-${GITHUB_SHA::7}"

          TAGS="${IMAGE}:${VERSION}"
          TAGS="${TAGS},${IMAGE}:${SHA}"

          if [ "${{ steps.versions.outputs.is_latest }}" = "true" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/${{ matrix.stack }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ matrix.version }}
            YQ_VERSION=${{ steps.versions.outputs.yq_version }}
            JQ_VERSION=${{ steps.versions.outputs.jq_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build image (PR - amd64 only)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/${{ matrix.stack }}/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ matrix.version }}
            YQ_VERSION=${{ steps.versions.outputs.yq_version }}
            JQ_VERSION=${{ steps.versions.outputs.jq_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan with Grype
        if: github.event_name != 'pull_request'
        uses: anchore/scan-action@v6
        with:
          image: "${{ env.REGISTRY }}/brik-runner-${{ matrix.stack }}:${{ matrix.version }}"
          fail-build: true
          severity-cutoff: high

      - name: Generate SBOM with Syft
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: "${{ env.REGISTRY }}/brik-runner-${{ matrix.stack }}:${{ matrix.version }}"
          format: cyclonedx-json
          output-file: sbom-${{ matrix.stack }}-${{ matrix.version }}.json

      - name: Upload SBOM
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.stack }}-${{ matrix.version }}
          path: sbom-${{ matrix.stack }}-${{ matrix.version }}.json

      - name: Smoke test
        if: github.event_name == 'pull_request'
        run: |
          IMAGE="${REGISTRY}/brik-runner-${{ matrix.stack }}:${{ matrix.version }}"
          echo "Testing ${IMAGE}"
          docker run --rm "${IMAGE}" yq --version
          docker run --rm "${IMAGE}" jq --version
          docker run --rm "${IMAGE}" git --version
          docker run --rm "${IMAGE}" bash -c '${{ matrix.verify_cmd }}'

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          IMAGE="${REGISTRY}/brik-runner-${{ matrix.stack }}:${{ matrix.version }}"
          cosign sign --yes "${IMAGE}"

      - name: Attest SBOM
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          IMAGE="${REGISTRY}/brik-runner-${{ matrix.stack }}:${{ matrix.version }}"
          cosign attest --yes --predicate sbom-${{ matrix.stack }}-${{ matrix.version }}.json --type cyclonedx "${IMAGE}"
