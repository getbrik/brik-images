name: Build and Push Images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

env:
  REGISTRY: ghcr.io/getbrik

jobs:
  lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: images/base/Dockerfile
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: images/node/Dockerfile
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: images/python/Dockerfile
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: images/java/Dockerfile
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: images/rust/Dockerfile
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: images/dotnet/Dockerfile
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: images/analysis/Dockerfile
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: images/scanner/Dockerfile
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: images/deploy/Dockerfile

  generate-matrix:
    name: Generate Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      matrix-dependent: ${{ steps.matrix.outputs.matrix_dependent }}
    steps:
      - uses: actions/checkout@v6
      - id: matrix
        run: |
          # Standalone images (no dependency on other brik-runner images)
          matrix=$(jq -c '{
            include: [
              .stacks | to_entries[] |
              select(.key != "deploy") |
              .key as $stack |
              .value.versions[] as $version |
              {
                stack: $stack,
                version: $version,
                verify_cmd: .value.verify_cmd
              }
            ]
          }' versions.json)
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

          # Dependent images (require brik-runner-base to be built first)
          matrix_dependent=$(jq -c '{
            include: [
              .stacks | to_entries[] |
              select(.key == "deploy") |
              .key as $stack |
              .value.versions[] as $version |
              {
                stack: $stack,
                version: $version,
                verify_cmd: .value.verify_cmd
              }
            ]
          }' versions.json)
          echo "matrix_dependent=${matrix_dependent}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.stack }}:${{ matrix.version }}
    needs: [lint, generate-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read versions
        id: versions
        run: |
          echo "yq_version=$(jq -r '.tools.yq' versions.json)" >> "$GITHUB_OUTPUT"
          echo "jq_version=$(jq -r '.tools.jq' versions.json)" >> "$GITHUB_OUTPUT"

          # Read deploy_tools versions (used by deploy image)
          for key in $(jq -r '.deploy_tools | keys[]' versions.json); do
            value=$(jq -r ".deploy_tools.\"${key}\"" versions.json)
            echo "${key}_version=${value}" >> "$GITHUB_OUTPUT"
          done

          # Read security_tools versions (used by quality and security images)
          for key in $(jq -r '.security_tools | keys[]' versions.json); do
            value=$(jq -r ".security_tools.\"${key}\"" versions.json)
            echo "${key}_version=${value}" >> "$GITHUB_OUTPUT"
          done

          # Check if this version is first in the array (gets "latest" tag)
          first=$(jq -r ".stacks.\"${{ matrix.stack }}\".versions[0]" versions.json)
          if [ "$first" = "${{ matrix.version }}" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${REGISTRY}/brik-runner-${{ matrix.stack }}"
          VERSION="${{ matrix.version }}"
          SHA="sha-${GITHUB_SHA::7}"

          TAGS="${IMAGE}:${VERSION}"
          TAGS="${TAGS},${IMAGE}:${SHA}"

          if [ "${{ steps.versions.outputs.is_latest }}" = "true" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Compute tool build-args
        id: tool-args
        run: |
          ARGS=""
          if [ "${{ matrix.stack }}" = "analysis" ]; then
            ARGS="SEMGREP_VERSION=${{ steps.versions.outputs.semgrep_version }}"
            ARGS="${ARGS}\nCHECKOV_VERSION=${{ steps.versions.outputs.checkov_version }}"
            ARGS="${ARGS}\nLICENSE_FINDER_VERSION=${{ steps.versions.outputs.license_finder_version }}"
            ARGS="${ARGS}\nSCANCODE_VERSION=${{ steps.versions.outputs.scancode_toolkit_version }}"
          elif [ "${{ matrix.stack }}" = "deploy" ]; then
            ARGS="HELM_VERSION=${{ steps.versions.outputs.helm_version }}"
            ARGS="${ARGS}\nKUBECTL_VERSION=${{ steps.versions.outputs.kubectl_version }}"
            ARGS="${ARGS}\nARGOCD_VERSION=${{ steps.versions.outputs.argocd_version }}"
          elif [ "${{ matrix.stack }}" = "scanner" ]; then
            ARGS="GRYPE_VERSION=${{ steps.versions.outputs.grype_version }}"
            ARGS="${ARGS}\nSYFT_VERSION=${{ steps.versions.outputs.syft_version }}"
            ARGS="${ARGS}\nOSV_SCANNER_VERSION=${{ steps.versions.outputs.osv_scanner_version }}"
            ARGS="${ARGS}\nHADOLINT_VERSION=${{ steps.versions.outputs.hadolint_version }}"
            ARGS="${ARGS}\nGITLEAKS_VERSION=${{ steps.versions.outputs.gitleaks_version }}"
            ARGS="${ARGS}\nTRUFFLEHOG_VERSION=${{ steps.versions.outputs.trufflehog_version }}"
            ARGS="${ARGS}\nDOCKLE_VERSION=${{ steps.versions.outputs.dockle_version }}"
          fi
          # Use multiline output
          {
            echo "args<<ARGSEOF"
            printf '%b\n' "$ARGS"
            echo "ARGSEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/${{ matrix.stack }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ matrix.version }}
            YQ_VERSION=${{ steps.versions.outputs.yq_version }}
            JQ_VERSION=${{ steps.versions.outputs.jq_version }}
            ${{ steps.tool-args.outputs.args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build image (PR - amd64 only)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/${{ matrix.stack }}/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ matrix.version }}
            YQ_VERSION=${{ steps.versions.outputs.yq_version }}
            JQ_VERSION=${{ steps.versions.outputs.jq_version }}
            ${{ steps.tool-args.outputs.args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan with Grype
        if: github.event_name != 'pull_request'
        id: grype
        uses: anchore/scan-action@v7
        with:
          image: "${{ env.REGISTRY }}/brik-runner-${{ matrix.stack }}:${{ matrix.version }}"
          fail-build: true
          severity-cutoff: critical
          only-fixed: true

      - name: Upload Grype SARIF to GitHub Security
        if: github.event_name != 'pull_request' && always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-${{ matrix.stack }}-${{ matrix.version }}

      - name: Generate security badge data
        if: github.event_name != 'pull_request' && always()
        run: |
          IMAGE="${REGISTRY}/brik-runner-${{ matrix.stack }}:${{ matrix.version }}"

          # scan-action installs grype in hostedtoolcache but does not persist PATH
          export PATH="/opt/hostedtoolcache/grype/$(ls /opt/hostedtoolcache/grype/ 2>/dev/null | head -1)/x64:${PATH}"

          # Image is already in Docker daemon (pulled by scan-action)
          # Full scan (not only-fixed) for transparency in badges
          grype "docker:${IMAGE}" -o json > /tmp/grype-full.json 2>/tmp/grype-err.log || true
          if [ -s /tmp/grype-err.log ]; then cat /tmp/grype-err.log; fi

          if [ ! -s /tmp/grype-full.json ] || ! jq -e '.matches' /tmp/grype-full.json >/dev/null 2>&1; then
            echo "::warning::Grype scan produced no valid results, using zero counts"
            CRITICAL=0; HIGH=0; MEDIUM=0; LOW=0
          else
            CRITICAL=$(jq '[.matches[] | select(.vulnerability.severity == "Critical")] | length' /tmp/grype-full.json)
            HIGH=$(jq '[.matches[] | select(.vulnerability.severity == "High")] | length' /tmp/grype-full.json)
            MEDIUM=$(jq '[.matches[] | select(.vulnerability.severity == "Medium")] | length' /tmp/grype-full.json)
            LOW=$(jq '[.matches[] | select(.vulnerability.severity == "Low")] | length' /tmp/grype-full.json)
          fi

          echo "CVE counts: Critical=$CRITICAL High=$HIGH Medium=$MEDIUM Low=$LOW"

          if [ "$CRITICAL" -gt 0 ]; then COLOR="critical"
          elif [ "$HIGH" -gt 0 ]; then COLOR="important"
          elif [ "$MEDIUM" -gt 0 ]; then COLOR="yellow"
          else COLOR="brightgreen"; fi

          mkdir -p badges
          jq -n --arg label "CVEs" \
                --arg message "${CRITICAL}C | ${HIGH}H | ${MEDIUM}M | ${LOW}L" \
                --arg color "$COLOR" \
                '{schemaVersion:1, label:$label, message:$message, color:$color}' \
            > "badges/${{ matrix.stack }}-${{ matrix.version }}.json"

      - name: Upload badge data
        if: github.event_name != 'pull_request' && always()
        uses: actions/upload-artifact@v7
        with:
          name: badge-${{ matrix.stack }}-${{ matrix.version }}
          path: badges/

      - name: Generate SBOM with Syft
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: "${{ env.REGISTRY }}/brik-runner-${{ matrix.stack }}:${{ matrix.version }}"
          format: cyclonedx-json
          output-file: sbom-${{ matrix.stack }}-${{ matrix.version }}.json

      - name: Upload SBOM
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.stack }}-${{ matrix.version }}
          path: sbom-${{ matrix.stack }}-${{ matrix.version }}.json

      - name: Smoke test
        if: github.event_name == 'pull_request'
        run: |
          IMAGE="${REGISTRY}/brik-runner-${{ matrix.stack }}:${{ matrix.version }}"
          echo "Testing ${IMAGE}"
          docker run --rm "${IMAGE}" yq --version
          docker run --rm "${IMAGE}" jq --version
          docker run --rm "${IMAGE}" git --version
          docker run --rm "${IMAGE}" bash -c '${{ matrix.verify_cmd }}'

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          IMAGE="${REGISTRY}/brik-runner-${{ matrix.stack }}:${{ matrix.version }}"
          cosign sign --yes "${IMAGE}"

      - name: Attest SBOM
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          IMAGE="${REGISTRY}/brik-runner-${{ matrix.stack }}:${{ matrix.version }}"
          # 409 Conflict is expected when the same attestation already exists in the transparency log
          cosign attest --yes --predicate sbom-${{ matrix.stack }}-${{ matrix.version }}.json --type cyclonedx "${IMAGE}" || {
            rc=$?
            if [ $rc -ne 0 ]; then
              echo "::warning::cosign attest exited with code $rc (409 conflict = attestation already exists, safe to ignore)"
            fi
          }

  # --- Phase 2: images that depend on brik-runner-base ---
  build-dependent:
    name: Build ${{ matrix.stack }}:${{ matrix.version }}
    needs: [build, generate-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix-dependent) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read versions
        id: versions
        run: |
          for key in $(jq -r '.deploy_tools | keys[]' versions.json); do
            value=$(jq -r ".deploy_tools.\"${key}\"" versions.json)
            echo "${key}_version=${value}" >> "$GITHUB_OUTPUT"
          done

          first=$(jq -r ".stacks.\"${{ matrix.stack }}\".versions[0]" versions.json)
          if [ "$first" = "${{ matrix.version }}" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${REGISTRY}/brik-runner-${{ matrix.stack }}"
          VERSION="${{ matrix.version }}"
          SHA="sha-${GITHUB_SHA::7}"

          TAGS="${IMAGE}:${VERSION}"
          TAGS="${TAGS},${IMAGE}:${SHA}"

          if [ "${{ steps.versions.outputs.is_latest }}" = "true" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/${{ matrix.stack }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            HELM_VERSION=${{ steps.versions.outputs.helm_version }}
            KUBECTL_VERSION=${{ steps.versions.outputs.kubectl_version }}
            ARGOCD_VERSION=${{ steps.versions.outputs.argocd_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build image (PR - amd64 only)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/${{ matrix.stack }}/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            HELM_VERSION=${{ steps.versions.outputs.helm_version }}
            KUBECTL_VERSION=${{ steps.versions.outputs.kubectl_version }}
            ARGOCD_VERSION=${{ steps.versions.outputs.argocd_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        if: github.event_name == 'pull_request'
        run: |
          IMAGE="${REGISTRY}/brik-runner-${{ matrix.stack }}:${{ matrix.version }}"
          echo "Testing ${IMAGE}"
          docker run --rm "${IMAGE}" bash -c '${{ matrix.verify_cmd }}'

  update-badges:
    name: Update Security Badges
    needs: [build, build-dependent]
    if: github.event_name != 'pull_request' && always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all badge artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: badge-*
          path: docs/badges/
          merge-multiple: true

      - name: Commit badge updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/badges/
          if git diff --staged --quiet; then
            echo "No badge changes to commit"
          else
            git commit -m "ci: update security badges [skip ci]"
            git push
          fi
